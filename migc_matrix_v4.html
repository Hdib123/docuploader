let statuses={},notes={},filter='all',selectedId=null,activeTab='orgchart',loading=true;

async function loadState(){
  try{const r=await window.storage.get('migc-v4');if(r&&r.value){const d=JSON.parse(r.value);statuses=d.s||{};notes=d.n||{};}}catch(e){}
  loading=false;render();
}
async function saveState(){try{await window.storage.set('migc-v4',JSON.stringify({s:statuses,n:notes}));}catch(e){}}

function getS(id){return statuses[id]||'pending';}
function advance(id,e){if(e)e.stopPropagation();const s=getS(id);if(s==='refused')return;const i=SC.indexOf(s);if(i<SC.length-1)statuses[id]=SC[i+1];saveState();render();}
function refuse(id,e){if(e)e.stopPropagation();statuses[id]='refused';saveState();render();}
function undo(id,e){if(e)e.stopPropagation();statuses[id]='pending';saveState();render();}
function setS(id,s){statuses[id]=s;saveState();render();}
function setFilter(f){filter=f;render();}
function setTab(t){activeTab=t;selectedId=null;render();}
function selectContact(id){selectedId=id;renderRight();renderList();}

function confirmed(){return new Set(C.filter(c=>['signed','verbal_yes'].includes(getS(c.id))).map(c=>c.id));}
function signedOrgs(){return C.filter(c=>c.cat==='org'&&['signed','verbal_yes'].includes(getS(c.id))).length;}
function reqsMet(c){
  const conf=confirmed();const oc=signedOrgs();
  return(c.req||[]).every(r=>{if(r==='min7orgs')return oc>=7;if(r==='ratner_step')return true;return conf.has(r);});
}
function reqsPending(c){
  const conf=confirmed();const oc=signedOrgs();
  return(c.req||[]).filter(r=>{if(r==='min7orgs')return oc<7;if(r==='ratner_step')return false;return!conf.has(r);})
    .map(r=>{if(r==='min7orgs')return signedOrgs()+'/7 orgs';const rc=C.find(x=>x.id===r);return rc?rc.name:r;});
}

function filteredContacts(){
  const q=(document.getElementById('search')||{}).value||'';
  const ql=q.toLowerCase();
  return C.filter(c=>{
    const s=getS(c.id);
    if(filter==='comite'&&c.cat!=='comite')return false;
    if(filter==='comm'&&c.cat!=='comm')return false;
    if(filter==='ambassadeur'&&c.cat!=='ambassadeur')return false;
    if(filter==='org'&&c.cat!=='org'&&c.cat!=='special')return false;
    if(filter==='active'&&!['contacted','interested','verbal_yes'].includes(s))return false;
    if(ql&&!(c.name.toLowerCase().includes(ql)||c.role.toLowerCase().includes(ql)))return false;
    return true;
  });
}

// ORG BOX RENDERING
function getOBClass(item){
  if(item.fixed)return'ob-fixed';
  if(item.empty)return'ob-empty';
  const s=getS(item.id);
  if(s==='signed')return'ob-signed';
  if(s==='verbal_yes')return'ob-verbal';
  if(s==='contacted'||s==='interested')return'ob-active';
  return'ob-pending';
}
function getOBStatus(item){
  if(item.fixed)return'— Fondateur';
  if(item.empty)return'— À définir';
  const s=getS(item.id);
  const m={pending:'— En attente',contacted:'— Contacté',interested:'— Intéressé',verbal_yes:'— OUI verbal ✓',signed:'— Signé ✓',refused:'— Refus'};
  return m[s]||'';
}
function obClick(item){if(!item.fixed&&!item.empty&&C.find(x=>x.id===item.id))selectContact(item.id);}

function obHtml(item){
  const cls=getOBClass(item);
  const st=getOBStatus(item);
  const clickable=!item.fixed&&!item.empty&&C.find(x=>x.id===item.id)?'cursor:pointer;':'cursor:default;';
  return`<div class="org-box ${cls}" style="${clickable}" onclick="obClick({id:'${item.id||''}',fixed:${!!item.fixed},empty:${!!item.empty}})">
    <div class="ob-name">${item.label}</div>
    <div class="ob-role">${item.sub}</div>
    <div class="ob-status">${st}</div>
  </div>`;
}

function renderMotor(){
  const conf=confirmed();
  const callNow=[],unlocked=[],inProg=[],blocked=[];
  C.forEach(c=>{
    const s=getS(c.id);
    if(['signed','verbal_yes','refused'].includes(s))return;
    const met=reqsMet(c);const pend=reqsPending(c);
    const justUnlocked=(c.req||[]).some(r=>r!=='ratner_step'&&conf.has(r));
    if(!met){blocked.push({c,pend});return;}
    if(['contacted','interested'].includes(s)){inProg.push(c);return;}
    if(justUnlocked&&s==='pending'){unlocked.push(c);return;}
    if(c.access==='direct_star'&&s==='pending'){callNow.push(c);}
  });
  const chains=[];
  C.forEach(c=>{
    if(!['signed','verbal_yes'].includes(getS(c.id)))return;
    (c.unlocks||[]).forEach(uid=>{
      const uc=C.find(x=>x.id===uid);if(!uc)return;
      if(['signed','verbal_yes','refused'].includes(getS(uid)))return;
      const key=`${c.id}→${uid}`;
      chains.push({from:c,to:uc,msg:UNLOCK_MSG[key]||`${c.name} confirmé → approcher ${uc.name}`});
    });
  });
  let h='';
  const mc=(type,c,msg,lv)=>`<div class="mcard mc-${type}" onclick="selectContact('${c.id}')"><div class="mc-n">${c.flag} ${c.name}</div>${msg?`<div class="mc-msg">${msg}</div>`:''}${lv?`<div class="mc-lv">${lv}</div>`:''}</div>`;
  if(callNow.length)h+=`<div class="msec"><div class="msec-h">APPELER MAINTENANT — CONTACTS ★</div>${callNow.slice(0,6).map(c=>mc('now',c,c.role,c.key)).join('')}</div>`;
  if(unlocked.length)h+=`<div class="msec"><div class="msec-h">DÉBLOQUÉ PAR VOS CONFIRMATIONS</div>${unlocked.slice(0,4).map(c=>mc('unlock',c,(c.req||[]).filter(r=>r!=='ratner_step').map(r=>{const rc=C.find(x=>x.id===r);return rc?rc.name:r;}).join(', '),c.key)).join('')}</div>`;
  if(chains.length)h+=`<div class="msec"><div class="msec-h">CHAÎNES D'INFLUENCE ACTIVES</div>${chains.map(({from,to,msg})=>`<div class="mcard mc-chain" onclick="selectContact('${to.id}')"><div class="mc-n">${from.flag} ${from.name} → ${to.flag} ${to.name}</div><div class="mc-msg">${msg}</div></div>`).join('')}</div>`;
  if(inProg.length)h+=`<div class="msec"><div class="msec-h">EN COURS — SUIVRE</div>${inProg.map(c=>mc('wait',c,SL[getS(c.id)],c.key)).join('')}</div>`;
  const bl=blocked.filter(x=>x.c.access!=='phase2');
  if(bl.length)h+=`<div class="msec"><div class="msec-h">EN ATTENTE DE PRÉREQUIS</div>${bl.slice(0,4).map(({c,pend})=>mc('block',c,'Attend : '+pend.join(', '),'','')).join('')}</div>`;
  const ufc_b=blocked.find(x=>x.c.id==='ufc');
  if(ufc_b)h+=`<div class="msec"><div class="msec-h">UFC — PHASE 2</div><div class="mcard mc-block" onclick="selectContact('ufc')"><div class="mc-n">🇺🇸 UFC — attendre ${signedOrgs()}/7 orgs + cultiver Lawrence Epstein</div></div></div>`;
  if(!h)h=`<div style="padding:16px;font-size:11px;color:var(--mu);text-align:center;">Avancez les statuts des contacts ★ dans la liste pour activer le moteur.</div>`;
  return h;
}

function saveNote(id){
  const el=document.getElementById('nt-'+id);if(!el)return;
  notes[id]=el.value;saveState();
  const b=document.getElementById('sb-'+id);
  if(b){b.classList.add('ok');b.textContent='Enregistré ✓';setTimeout(()=>{b.classList.remove('ok');b.textContent='Enregistrer';},1500);}
  renderList();
}

function renderList(){
  const items=filteredContacts();
  document.getElementById('lcnt').textContent=items.length+' contact'+(items.length!==1?'s':'');
  document.getElementById('clist').innerHTML=items.map(c=>{
    const s=getS(c.id);const r=s==='refused';const sel=selectedId===c.id;
    const hn=!!(notes[c.id]&&notes[c.id].trim());
    return`<div class="ccard${r?' refused':''}${sel?' sel':''}" onclick="selectContact('${c.id}')">
      <span class="cflag">${c.flag}</span>
      <div class="ci"><div class="cname">${c.name}</div><div class="crole">${c.via?'↳ '+c.via:c.role}</div></div>

      <div class="adot ${AC[c.access]}"></div>
      ${r?`<button class="spill s-refused" onclick="undo('${c.id}',event)">↩</button>`
        :`<button class="spill s-${s}" onclick="advance('${c.id}',event)">${SL[s]}</button>

  }).join('');
}

function renderRight(){
  const rc=document.getElementById('rcontent');
  const rt=document.getElementById('rtabs');
  if(selectedId){
    const c=C.find(x=>x.id===selectedId);
    if(c){
      rt.innerHTML=`<button class="back-btn" onclick="clearSel()">← Retour</button><span style="font-size:10px;color:var(--mu);padding:5px 4px;">${c.flag} ${c.name}</span>`;
      rc.innerHTML=renderProfile(c);
      return;
    }
  }
  const tabs=['orgchart','chemins','moteur','kanban'];
  const labels=['Organigramme','Chemins','Moteur','Kanban'];
  rt.innerHTML=tabs.map((t,i)=>`<div class="tab${activeTab===t?' on':''}" onclick="setTab('${t}')">${labels[i]}</div>`).join('');
  if(activeTab==='orgchart')rc.innerHTML=renderOrgChart();
  else if(activeTab==='chemins')rc.innerHTML=renderChains();
  else if(activeTab==='moteur')rc.innerHTML=renderMotor();
  else rc.innerHTML=renderKanban();
}

function clearSel(){selectedId=null;render();}

function updateStats(){
  let s=0,v=0,ci=0,p=0,r=0;
  C.forEach(c=>{const st=getS(c.id);
    if(st==='signed')s++;else if(st==='verbal_yes')v++;
    else if(st==='contacted'||st==='interested')ci++;
    else if(st==='pending')p++;else if(st==='refused')r++;
  });
  document.getElementById('ns').textContent=s;
  document.getElementById('nv').textContent=v;
  document.getElementById('nc').textContent=ci;
  document.getElementById('np').textContent=p;
  document.getElementById('no').textContent=r;
}

function updateFilters(){
  document.querySelectorAll('.fbtn').forEach(b=>{
    const f=(b.getAttribute('onclick')||'').match(/'([^']+)'/)?.[1];
    if(f)b.classList.toggle('on',f===filter);
  });
}

function render(){
  if(loading)return;
  updateStats();updateFilters();renderList();renderRight();
}

loadState();
</script>
